frontend hello_http
  bind *:80
  mode http
  acl hello_path path_beg /hello
  use_backend hello_backend if hello_path

backend hello_backend
  mode http
  option httpchk
  http-check send meth GET uri /hello ver HTTP/1.1 hdr Host localhost
  http-check expect status 200
  server hello_app 127.0.0.1:4001 check
