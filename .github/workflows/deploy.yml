name: Deploy
'on':
  push:
    branches:
    - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: default
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Deploy to Hetzner
      id: deploy
      uses: juliankahlert/hetzner-deploy-action@main
      with:
        hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
        public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        image: fedora-43
        server_name: hello-hetzner
        project_tag: hello-hetzner
        source_dir: ./dist
        target_dir: /opt/app
        service: |
          name: hello-hetzner
          user: hello-hetzner
          exec-start: "/usr/bin/python3 /opt/app/server.py"
        firewall_enabled: 'true'
        certbot: 'true'
        duckdns: "${{ secrets.DUCKDNS_TOKEN }}:${{ secrets.DUCKDNS_DOMAIN }}"
        host_port: 80
        app_port: 4001
        route: '/hello{,/**}'
    - name: Log deploy outputs
      run: |
        echo "server_ip=${{ steps.deploy.outputs.server_ip }}"
        echo "server_id=${{ steps.deploy.outputs.server_id }}"
        echo "server_status=${{ steps.deploy.outputs.server_status }}"
